<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>꼬리상사 퇴근전쟁</title>

<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
    text-align: center;
    padding: 60px;
  }

  .logo-wrap { margin-bottom: 30px; }
  .logo-wrap img { max-width: 350px; width: 100%; cursor: pointer; }

  .title-image { margin-bottom: 30px; cursor: pointer; }
  .title-image img { max-width: 400px; width: 100%; }

  .result { margin-top: 30px; }

  .image-box {
    width: 100%;
    height: 260px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .success-circle {
    position: absolute;
    width: 260px;
    height: 260px;
    border-radius: 50%;
    background: #FFF3B0;
    filter: blur(35px);
    opacity: 0;
    transform: scale(0.9);
    transition: 0.35s ease;
    z-index: 0;
  }

  .success-circle.show {
    opacity: 1;
    transform: scale(1.05);
  }

  .image-box img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 12px;
    position: relative;
    z-index: 1;
  }

  .result-text {
    margin-top: 18px;
    font-size: 18px;
    line-height: 1.5;
    color: #8D7860;
    white-space: pre-line;
  }

  .result-text.bold {
    font-weight: bold;
    animation: holyGlow 1.6s ease-in-out infinite;
  }

  @keyframes holyGlow {
    0% { text-shadow: 0 0 0px rgba(255,230,120,0); transform: scale(1); }
    40% {
      text-shadow:
        0 0 8px rgba(255,230,120,0.55),
        0 0 18px rgba(255,210,90,0.35);
      transform: scale(1.03);
    }
    100% { text-shadow: 0 0 0px rgba(255,230,120,0); transform: scale(1); }
  }

  .try-counter {
    display: inline-block;
    margin-top: 12px;
    padding: 10px 18px;
    border-radius: 999px;
    background: #8D7860;
    color: white;
    font-size: 14px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.12);
  }

  .count-number { font-weight: bold; font-size: 16px; margin-left: 6px; }

  @keyframes bump {
    0% { transform: scale(1); }
    30% { transform: scale(1.25); }
    60% { transform: scale(0.95); }
    100% { transform: scale(1); }
  }

  .bump { animation: bump 0.35s ease; }

  @keyframes heartbeat {
    0% { transform: scale(1); }
    25% { transform: scale(1.05); }
    50% { transform: scale(1); }
    75% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  .waiting { animation: heartbeat 0.6s ease-in-out infinite; opacity: 0.7; }

  @keyframes pop {
    0% { opacity: 0; transform: scale(0.85); }
    60% { opacity: 1; transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  .pop { animation: pop 0.35s ease-out; }

  .copyright { margin-top: 100px; font-size: 12px; color: #8D7860; }

  /* ✅ 컨페티 최상단 */
  .particle {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    pointer-events: none;
    animation: explode var(--duration) ease-out forwards;
    z-index: 9999; /* 핵심 */
  }

  @keyframes explode {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0.2); opacity: 0; }
  }

  /* ✅ 퇴근 텍스트 최상단 */
  .success-text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 72px;
    font-weight: bold;
    color: #8D7860;
    opacity: 0;
    pointer-events: none;
    animation: textPop var(--text-duration) ease-out forwards;
    z-index: 10000; /* 핵심 */
  }

  @keyframes textPop {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.2); }
    30% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
    70% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
  }
</style>
</head>

<body>

<div class="container">

  <div class="logo-wrap">
    <img src="https://i.imgur.com/EPFQHHT.png" onclick="location.reload()">
  </div>

  <div style="margin-bottom:20px; color:#8D7860; font-size:14px;">
    <div id="todayText"></div>
    <div id="countdownText"></div>

    <div class="try-counter">
      오늘의 퇴근 시도 횟수
      <span id="countNumber" class="count-number">0</span>
    </div>
  </div>

  <div class="title-image" onclick="drawCocoa()">
    <img id="drawImage" src="https://i.imgur.com/FrkpWnb.png">
  </div>

  <div class="result">
    <div class="image-box">
      <div id="successCircle" class="success-circle"></div>
      <img id="resultImage">
    </div>
    <div class="result-text" id="resultText"></div>
  </div>

  <div class="copyright">© Pong PocoPoco Project</div>
</div>

<script>
const FIREWORK_CONFIG = {
  particleCount: 120,
  distanceMin: 120,
  distanceMax: 260,
  duration: 1600,
  textDuration: 1400,
  colors: ["#9ABF62","#C69B60","#FA8B60","#FFE18E"]
};

const items = [
    { img: "https://i.imgur.com/43V1qXZ.png", text: "당신은 퇴근입니다!!! 퇴근하세요!!!", success: true },

    { img: "https://i.imgur.com/iXYlT72.png", text: "당신은... 돼근입니다." },
    { img: "https://i.imgur.com/Hj3WzRD.png", text: "당신은... 되근입니다." },
   { img: "https://i.imgur.com/i7u6ruv.png", text: "당신은... 야근입니다." },
  { img: "https://i.imgur.com/lu0Fc0c.png", text: "당신은... 잔업입니다." },
    { img: "https://i.imgur.com/EIp79VK.png", text: "당신은... 최근입니다." },
    { img: "https://i.imgur.com/dfvstTb.png", text: "당신은... 퇴글입니다." },
    { img: "https://i.imgur.com/IzwTjVw.png", text: "당신은... 출근입니다." },
  { img: "https://i.imgur.com/pJYzzc7.png", text: "당신은... 택견입니다." },    
  { img: "https://i.imgur.com/7zQQjob.png", text: "당신은... 토i근입니다." },
    { img: "https://i.imgur.com/0w22csA.png", text: "당신은... 퇘근입니다." },
   { img: "https://i.imgur.com/f804lz2.png", text: "당신은... 퇴군입니다." },
   { img: "https://i.imgur.com/EcsB4z7.png", text: "당신은... 퇴귿입니다." },
   { img: "https://i.imgur.com/YTeb28e.png", text: "당신은... 퇴긍입니다." },
   { img: "https://i.imgur.com/sVzyhut.png", text: "당신은... 퇴긴입니다." },
    { img: "https://i.imgur.com/KD4dlGH.png", text: "당신은... 퇴끈입니다." },
    { img: "https://i.imgur.com/6bZUuGo.png", text: "당신은... 퇴큰입니다." },
   { img: "https://i.imgur.com/KSsHZdL.png", text: "당신은... 퉤!!!" },

    { img: "https://i.imgur.com/DkcENqR.png", text: "당신은... 퉤근입니다." },  // ✅ 버그 수정
    { img: "https://i.imgur.com/xnCATX6.png", text: "당신은... 튀근입니다." },
    { img: "https://i.imgur.com/cQ5gOlf.png", text: "당신은... 훠궈입니다.\n맛있겠다." }
];
function getTodayKey() { const d = new Date(); return ${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}; } 
  function formatToday() { const d = new Date(); return ${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일; } 
  function getTimeUntilMidnight() { 
    const now = new Date(); 
const midnight = new Date(); midnight.setHours(24,0,0,0);
    const diff = midnight - now; const h = String(Math.floor(diff/3600000)).padStart(2,"0"); 
    const m = String(Math.floor(diff/60000)%60).padStart(2,"0"); const s = String(Math.floor(diff/1000)%60).padStart(2,"0"); 
    return ${h}:${m}:${s}; }
  
function toggleSuccessCircle(show) {
  document.getElementById("successCircle").classList.toggle("show", show);
}

function triggerSuccessEffect() {
  const cfg = FIREWORK_CONFIG;

  const text = document.createElement("div");
  text.className = "success-text";
  text.innerText = "퇴근!!!";
  text.style.setProperty("--text-duration", cfg.textDuration + "ms");
  document.body.appendChild(text);
  setTimeout(() => text.remove(), cfg.textDuration);

  for (let i = 0; i < cfg.particleCount; i++) {
    const p = document.createElement("div");
    p.className = "particle";

    const angle = Math.random() * Math.PI * 2;
    const distance = cfg.distanceMin + Math.random() * (cfg.distanceMax - cfg.distanceMin);

    p.style.left = "50%";
    p.style.top = "50%";
    p.style.background = cfg.colors[Math.floor(Math.random() * cfg.colors.length)];
    p.style.setProperty("--dx", Math.cos(angle) * distance + "px");
    p.style.setProperty("--dy", Math.sin(angle) * distance + "px");
    p.style.setProperty("--duration", cfg.duration + "ms");

    document.body.appendChild(p);
    setTimeout(() => p.remove(), cfg.duration);
  }
}
function updateDateInfo() { document.getElementById("todayText").innerText = 오늘 날짜 · ${formatToday()}; document.getElementById("countdownText").innerText = 초과 업무까지 남은 시간 · ${getTimeUntilMidnight()}; }
function showResult(result) {
  const textEl = document.getElementById("resultText");

  document.getElementById("resultImage").src = result.img;
  textEl.innerText = result.text;

  textEl.classList.toggle("bold", !!result.success);
  toggleSuccessCircle(!!result.success);
}

function drawCocoa() {
  const drawImg = document.getElementById("drawImage");
  drawImg.classList.add("waiting");

  setTimeout(() => {
    drawImg.classList.remove("waiting");

    const result = items[Math.floor(Math.random() * items.length)];
    showResult(result);

    document.getElementById("resultImage").classList.add("pop");

    if (result.success) triggerSuccessEffect();
  }, 800);
}
</script>

</body>
</html>
