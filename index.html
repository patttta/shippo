<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>꼬리상사 퇴근전쟁</title>

<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
    text-align: center;
    padding: 60px;
  }

  .logo-wrap {
    margin-bottom: 30px;
  }

  .logo-wrap img {
    max-width: 350px;
    width: 100%;
    cursor: pointer;
  }

  .title-image {
    margin-bottom: 30px;
    cursor: pointer;
  }

  .title-image img {
    max-width: 400px;
    width: 100%;
  }

  .result {
    margin-top: 30px;
  }

  .image-box {
    width: 100%;
    height: 260px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .image-box img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 12px;
  }

  .result-text {
    margin-top: 18px;
    font-size: 18px;
    line-height: 1.5;
    color: #8D7860;
    white-space: pre-line;
  }

  /* 횟수 버튼 */
  .try-counter {
    display: inline-block;
    margin-top: 12px;
    padding: 10px 18px;
    border-radius: 999px;
    background: #8D7860;
    color: white;
    font-size: 14px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.12);
    transform: scale(1);
  }

  .count-number {
    font-weight: bold;
    font-size: 16px;
    margin-left: 6px;
  }

  /* 숫자 변경 애니메이션 */
  @keyframes bump {
    0% { transform: scale(1); }
    30% { transform: scale(1.25); }
    60% { transform: scale(0.95); }
    100% { transform: scale(1); }
  }

  .bump {
    animation: bump 0.35s ease;
  }

  @keyframes heartbeat {
    0% { transform: scale(1); }
    25% { transform: scale(1.05); }
    50% { transform: scale(1); }
    75% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  .waiting {
    animation: heartbeat 0.6s ease-in-out infinite;
    opacity: 0.7;
  }

  @keyframes pop {
    0% { opacity: 0; transform: scale(0.85); }
    60% { opacity: 1; transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  .pop {
    animation: pop 0.35s ease-out;
  }

  .copyright {
    margin-top: 100px;
    font-size: 12px;
    color: #8D7860;
  }
</style>
</head>

<body>

<div class="container">

  <div class="logo-wrap">
    <img src="https://i.imgur.com/EPFQHHT.png"
         alt="퐁모코 로고"
         onclick="location.reload()">
  </div>

  <div style="margin-bottom:20px; color:#8D7860; font-size:14px;">
    <div id="todayText"></div>
    <div id="countdownText"></div>

    <!-- 버튼형 카운터 -->
    <div class="try-counter">
      오늘의 퇴근 시도 횟수
      <span id="countNumber" class="count-number">0</span>
    </div>
  </div>

  <div class="title-image" onclick="drawCocoa()">
    <img id="drawImage"
         src="https://i.imgur.com/FrkpWnb.png"
         alt="퇴근확인">
  </div>

  <div class="result" id="resultBox">
    <div class="image-box">
      <img id="resultImage">
    </div>
    <div class="result-text" id="resultText"></div>
  </div>

  <div class="copyright">
    © Pong PocoPoco Project
  </div>

</div>

<script>
  const items = [
    { img: "https://i.imgur.com/43V1qXZ.png", text: "당신은 퇴근입니다!!! 퇴근하세요!!!" },
    { img: "", text: "오늘의 커피 운세는?\n도토리 2톨!!" },
    { img: "", text: "오늘의 커피 운세는?\n도토리 3톨!!!" },
    { img: "", text: "꽝!!!!" }
  ];

  function getTodayKey() {
    const d = new Date();
    return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
  }

  function formatToday() {
    const d = new Date();
    return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
  }

  function getTimeUntilMidnight() {
    const now = new Date();
    const midnight = new Date();
    midnight.setHours(24,0,0,0);
    const diff = midnight - now;
    const h = String(Math.floor(diff/3600000)).padStart(2,"0");
    const m = String(Math.floor(diff/60000)%60).padStart(2,"0");
    const s = String(Math.floor(diff/1000)%60).padStart(2,"0");
    return `${h}:${m}:${s}`;
  }

  function getTodayTryCount() {
    return parseInt(localStorage.getItem("tryCount_" + getTodayKey()) || "0");
  }

  function increaseTryCount() {
    const key = "tryCount_" + getTodayKey();
    const newCount = getTodayTryCount() + 1;
    localStorage.setItem(key, newCount);
    return newCount;
  }

  function animateCounter(newValue) {
    const el = document.getElementById("countNumber");
    el.textContent = newValue;

    el.classList.remove("bump");
    void el.offsetWidth;
    el.classList.add("bump");
  }

  function showResult(imgSrc, text) {
    document.getElementById("resultImage").src = imgSrc;
    document.getElementById("resultText").innerText = text;
  }

  function drawCocoa() {
    const drawImg = document.getElementById("drawImage");
    drawImg.classList.add("waiting");

    const count = increaseTryCount();

    setTimeout(() => {
      drawImg.classList.remove("waiting");

      const result = items[Math.floor(Math.random() * items.length)];

      showResult(result.img, result.text);

      const img = document.getElementById("resultImage");
      img.classList.remove("pop");
      void img.offsetWidth;
      img.classList.add("pop");

      animateCounter(count);

      localStorage.setItem("lastDrawImg", result.img);
      localStorage.setItem("lastDrawText", result.text);
    }, 800);
  }

  function updateDateInfo() {
    document.getElementById("todayText").innerText =
      `오늘 날짜 · ${formatToday()}`;
    document.getElementById("countdownText").innerText =
      `초과 업무까지 남은 시간 · ${getTimeUntilMidnight()}`;
  }

  window.onload = function () {
    updateDateInfo();
    setInterval(updateDateInfo, 1000);

    animateCounter(getTodayTryCount());

    if (localStorage.getItem("lastDrawImg")) {
      showResult(
        localStorage.getItem("lastDrawImg"),
        localStorage.getItem("lastDrawText")
      );
    }
  };
</script>

</body>
</html>
